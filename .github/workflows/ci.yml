name: "Application Pipeline"

on:
  push:
  workflow_dispatch:
    inputs:
      target_sub_env:
        description: 'Sous-environnement cible (ex: sandbox)'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  security-events: write
  actions: read

jobs:
  # --- JOB 1 : VALIDATION TECHNIQUE ET SÉCURITÉ ---
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: "Clonage du code source"
        uses: actions/checkout@v4

      - name: "Initialisation de CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: "Configuration de Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "Cache des modules npm"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "Installation des dépendances"
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: "Exécution de la suite de tests"
        run: npm test

      - name: "Publication du rapport de tests"
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/junit-report.xml'
          
      - name: "Analyse des vulnérabilités (CodeQL)"
        uses: github/codeql-action/analyze@v3

  # --- JOB 2 : DÉPLOIEMENT HERMÉTIQUE (SOPS) ---
  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: "Clonage du code source"
        uses: actions/checkout@v4

      - name: "Installation des binaires SOPS et Age"
        run: |
          sudo apt-get update && sudo apt-get install -y age
          curl -LO https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          sudo mv sops-v3.8.1.linux.amd64 /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops

      - name: "Installation des modules Node.js"
        run: npm ci

      - name: "Déchiffrement et Lancement hermétique de l'application"
        # On passe la clé secrète en variable d'environnement pour SOPS
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          echo "🚀 Extraction des secrets de production au format dotenv..."
          
          # SOPS déchiffre et convertit le YAML en paires CLE=VALEUR dans un fichier masqué
          sops -d --output-type dotenv secrets-prod.yaml > .env.production
          
          # Chargement des variables en mémoire sans les afficher
          export $(cat .env.production | xargs)
          
          echo "Démarrage de l'application..."
          node src/server.js &
          
          # Simulation d'un contrôle de santé du serveur
          sleep 3
          echo " Serveur démarré en production avec les bons secrets."
          
          # Principe de SoD / Zero Trust : on détruit les traces immédiatement
