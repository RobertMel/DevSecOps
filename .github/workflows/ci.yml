name: "Application Pipeline"

on:
  push:

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: "Clonage du code source"
        uses: actions/checkout@v4

      - name: "Configuration de Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 1. OPTIMISATION : Mise en cache des dépendances
      - name: "Cache des modules npm"
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 2. LISIBILITÉ : Groupement des logs d'installation
      - name: "Installation des dépendances"
        run: |
          echo "::group::Installation des modules Node.js"
          npm ci
          echo "::endgroup::"

      - name: "Exécution de la suite de tests"
        run: npm test

      # 3. RAPPORTS GRAPHIQUES : Publication systématique
      - name: "Publication du rapport de tests"
        uses: mikepenz/action-junit-report@v4
        if: always() # Exécuté même si l'étape précédente (npm test) échoue
        with:
          report_paths: '**/junit-report.xml'

      # 4. SÉCURITÉ : Test de masquage des secrets
      - name: "Injection et test de masquage des secrets"
        env:
          ENV_VAR: ${{ vars.APP_ENVIRONMENT }}
          SECRET_VAR: ${{ secrets.AWS_SECRET_KEY }}
        run: |
          echo "Environnement cible : $ENV_VAR"
          echo "Clé secrète injectée : $SECRET_VAR"

